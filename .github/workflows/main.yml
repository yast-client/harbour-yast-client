name: Build and Release

env:
  RELEASE: 5.0.0.43

on:
  push:
    tags:
      - '*'
    branches:
      - main
    paths-ignore:
      - doc/**
      - README.md
      - LICENSE
  # to prevent secrets leaking,
  # we don't build on PRs
  #pull_request:
  #  branches:
  #    - master
  workflow_dispatch:

jobs:
  build:
    name: Build and upload
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: [aarch64, armv7hl, i486]
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Prepare
      run: mkdir output

    - name: Fetch TDLib
      uses: dsaltares/fetch-gh-release-asset@master
      with:
        repo: "roundedrectangle/td"
        file: "tdlib.zip"
        target: tdlib/tdlib.zip
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Decompress TDLib
      uses: TonyBogdanov/zip@1.0
      with:
        args: unzip -qq -n ./tdlib/tdlib.zip -d ./tdlib

    - name: Set Secrets
      uses: DamianReeves/write-file-action@master
      with:
        path: ./src/tdlibsecrets.h
        contents: |
          #ifndef TDLIBSECRETS_H
          #define TDLIBSECRETS_H
          const char TDLIB_API_ID[] = "${{secrets.TDLIB_API_ID}}";
          const char TDLIB_API_HASH[] = "${{secrets.TDLIB_API_HASH}}";
          #endif // TDLIBSECRETS_H
        write-mode: overwrite

    - name: Build ${{ matrix.arch }} on ${{ env.RELEASE }}
      uses: coderus/github-sfos-build@master
      with:
        release: ${{ env.RELEASE }}
        arch: ${{ matrix.arch }}

    - uses: actions/upload-artifact@v7
      with:
        archive: false
        path: RPMS/

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Download artifacts
      uses: actions/download-artifact@v8
      with:
        path: RPMS
        pattern: harbour-ferniegram-*
        merge-multiple: true

    - name: Upload the nightly release
      run: |
        set -x
        gh release upload nightly --clobber RPMS/*.rpm
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create release
      if: contains(github.ref, 'v')
      run: |
        set -x
        tag_name="${GITHUB_REF##*/}"
        gh release create "$tag_name" RPMS/*.rpm
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}