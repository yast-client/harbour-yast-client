name: Build and Release

env:
  RELEASE: 5.0.0.43

on:
  push:
    tags:
      - '*'
    branches:
      - main
    paths-ignore:
      - doc/**
      - README.md
      - LICENSE
  # to prevent secrets leaking,
  # we don't build on PRs
  #pull_request:
  #  branches:
  #    - master
  workflow_dispatch:

jobs:
  build:
    name: Build and upload
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: [aarch64, armv7hl, i486]
        variant: [harbour, custom]
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Prepare
      run: mkdir output

    - name: Fetch TDLib
      uses: dsaltares/fetch-gh-release-asset@master
      with:
        repo: "yast-client/td"
        file: "tdlib.zip"
        target: tdlib/tdlib.zip
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Decompress TDLib
      run: unzip -qq -n ./tdlib/tdlib.zip -d ./tdlib

    - name: Fetch tg_owt
      if: ${{ matrix.variant != 'harbour' }}
      uses: dsaltares/fetch-gh-release-asset@master
      with:
        repo: "yast-client/tg_owt"
        file: "tg_owt.zip"
        target: tg_owt/tg_owt.zip
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Decompress tg_owt
      if: ${{ matrix.variant != 'harbour' }}
      run: unzip -qq -n ./tg_owt/tg_owt.zip -d ./tg_owt

    - name: Prepare build variant
      run: |
        if [ "${{ matrix.variant }}" = "harbour" ]; then
          sed -i 's/^Release:.*$/Release: 1/' rpm/harbour-yast-client.spec || true
          sed -i 's/-DHARBOUR_COMPLIANCE=.*$/-DHARBOUR_COMPLIANCE=on/' rpm/harbour-yast-client.spec || true
        fi

    - name: Set Secrets
      uses: DamianReeves/write-file-action@master
      with:
        path: ./src/tdlibsecrets.h
        contents: |
          #pragma once
          const char TDLIB_API_ID[] = "${{secrets.TDLIB_API_ID}}";
          const char TDLIB_API_HASH[] = "${{secrets.TDLIB_API_HASH}}";
        write-mode: overwrite

    - name: Build ${{ matrix.arch }} on ${{ env.RELEASE }}
      uses: coderus/github-sfos-build@master
      with:
        release: ${{ env.RELEASE }}
        arch: ${{ matrix.arch }}

    - uses: actions/upload-artifact@v7
      with:
        archive: false
        path: RPMS/

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Download artifacts
      uses: actions/download-artifact@v8
      with:
        path: RPMS
        pattern: harbour-yast-client-*
        merge-multiple: true

    - name: Upload the nightly release
      run: |
        set -x
        gh release view nightly --json assets --jq '.assets[].name' | xargs -I {} gh release delete-asset nightly {} -y || true
        gh release upload nightly RPMS/*.rpm
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create release
      if: contains(github.ref, 'v')
      run: |
        set -x
        tag_name="${GITHUB_REF##*/}"
        gh release create "$tag_name" RPMS/*.rpm
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  telegram:
    name: Upload to Telegram
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v8
      with:
        path: RPMS
        pattern: harbour-yast-client-*
        merge-multiple: true

    - name: Upload the release to Telegram
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      run: |
        if [[ "${{ github.ref }}" == *"v"* ]]; then
          CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID_RELEASE }}
        else
          CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID_NIGHTLY }}
        fi
        FILES=( RPMS/harbour-yast-client-* )
        MEDIA_ARRAY_CONTENT=""

        for i in "${!FILES[@]}"; do
          echo "Uploading ${FILES[$i]}"

          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${{ secrets.TELEGRAM_TEMP_CHAT_ID }}" \
            -F "document=@${FILES[$i]}")
          FILE_ID=$(echo "$RESPONSE" | jq -r '.result.document.file_id')

          if [[ "$FILE_ID" == "null" ]]; then
            echo "Couldn't upload ${FILES[$i]}: $RESPONSE"
            exit 1
          fi

          MEDIA_ARRAY_CONTENT+="{\"type\":\"document\",\"media\":\"${FILE_ID}\"}"
          if [ $i -lt $(( ${#FILES[@]} - 1 )) ]; then
            MEDIA_ARRAY_CONTENT+=","
          fi
        done

        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMediaGroup" \
          -F "chat_id=${CHAT_ID}" \
          -F "media=[${MEDIA_ARRAY_CONTENT}]"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true